name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

  quality-gates:
    runs-on: ubuntu-latest
    needs: validate-wrapper

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so git rev-list --count HEAD works correctly.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run debug quality gates
        run: ./gradlew :app:ciCriticalGate :app:testDebugUnitTest :app:assembleDebug -Pci.strict.lint=true --no-daemon --stacktrace

      - name: Run unsigned release dry-run build (non-shipping)
        run: ./gradlew :app:assembleRelease -Pallow.unsigned.release=true --no-daemon --stacktrace

      - name: Upload lint and test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-quality-reports
          path: |
            app/build/reports
            app/build/test-results

  emulator-tests:
    runs-on: ubuntu-latest
    needs: quality-gates
    # Run smoke tests on every push and pull_request.
    strategy:
      matrix:
        api-level: [29]   # API 29 (Android 10) – stable, fast, broad device coverage.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle wrapper executable
        run: chmod +x gradlew

      # KVM acceleration is required for usable emulator performance on GitHub runners.
      - name: Enable KVM group perms for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload instrumented test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results

  release-sanity:
    runs-on: ubuntu-latest
    needs: emulator-tests
    if: github.event_name == 'push'
    env:
      BATPHONE_RELEASE_STORE_PASSWORD: ${{ secrets.BATPHONE_RELEASE_STORE_PASSWORD }}
      BATPHONE_RELEASE_KEY_PASSWORD: ${{ secrets.BATPHONE_RELEASE_KEY_PASSWORD }}
      BATPHONE_RELEASE_KEY_ALIAS: ${{ secrets.BATPHONE_RELEASE_KEY_ALIAS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle wrapper executable
        run: chmod +x gradlew

      - name: Prepare optional release keystore
        shell: bash
        run: |
          if [ -n "${{ secrets.BATPHONE_RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.BATPHONE_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/batphone-release.keystore"
            echo "BATPHONE_RELEASE_KEYSTORE=$RUNNER_TEMP/batphone-release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Run signed release readiness gate
        if: env.BATPHONE_RELEASE_KEYSTORE != ''
        run: ./gradlew :app:releaseReadinessGate -Prelease.key.store=$BATPHONE_RELEASE_KEYSTORE -Prelease.key.alias=$BATPHONE_RELEASE_KEY_ALIAS --no-daemon --stacktrace

      - name: Assemble unsigned release dry run (non-shipping)
        if: env.BATPHONE_RELEASE_KEYSTORE == ''
        run: ./gradlew :app:assembleRelease -Pallow.unsigned.release=true --no-daemon --stacktrace

      - name: Upload release reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-reports
          path: |
            app/build/reports
            app/build/outputs

